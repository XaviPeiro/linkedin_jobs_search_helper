name: external_jobs_ingestion

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: external_jobs
      MONGO_INITDB_ROOT_PASSWORD: external_jobs
      MONGO_INITDB_DATABASE: external_jobs
    ports:
      - "27018:27017"
    volumes:
      - ./docker/mongo/data:/data/db
      - ./docker/init/mongo:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh 'mongodb://external_jobs:external_jobs@localhost:27017/external_jobs' --quiet --eval 'db.runCommand({ ping: 1 }).ok'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
